<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Contact Us | Daily English</title>
<style>
:root{--bg:#f4f0e8;--paper:#fffdf8;--ink:#1f1c18;--muted:#6d6459;--line:#ded3c4;--accent:#173f5f;--soft:#efe4d3;--shadow:0 18px 45px rgba(36,24,12,.12)}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 0 0,rgba(23,63,95,.13),transparent 30rem),radial-gradient(circle at 100% 100%,rgba(143,63,47,.12),transparent 28rem),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
.wrap{width:min(860px,calc(100% - 32px));margin:0 auto;padding:34px 0 52px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px}
.brand{font-family:ui-serif,Georgia,serif;font-size:clamp(30px,7vw,54px);line-height:1;font-weight:950;letter-spacing:-.05em}
.home{color:var(--accent);font-weight:850;text-decoration:none;border:1px solid var(--line);background:rgba(255,253,248,.75);border-radius:999px;padding:9px 13px;white-space:nowrap}
.card{background:rgba(255,253,248,.94);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:clamp(20px,5vw,34px)}
h1{font-family:ui-serif,Georgia,serif;font-size:clamp(34px,7vw,58px);line-height:1.02;letter-spacing:-.05em;margin:0 0 10px}
.intro{color:var(--muted);font-size:17px;margin:0 0 22px;max-width:62ch}
.form-shell{overflow:hidden;border:1px solid var(--line);border-radius:22px;background:white;box-shadow:0 12px 30px rgba(36,24,12,.08)}
iframe{display:block;width:100%;height:min(1180px,calc(100vh + 380px));min-height:860px;border:0;background:white}
.open-link{display:inline-flex;align-items:center;justify-content:center;margin-top:16px;color:var(--accent);font-weight:900;text-decoration:none;border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:10px 14px}
.note{color:var(--muted);font-size:14px;margin:14px 0 0}
@media(max-width:640px){.wrap{width:min(100% - 20px,860px);padding:20px 0 36px}.top{margin-bottom:14px}.card{border-radius:22px;padding:18px}iframe{min-height:920px;height:1120px}.home{padding:8px 11px}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div class="brand">Daily English</div><a class="home" href="/">← Lessons</a></div>
    <main class="card">
      <h1>Contact Us</h1>
      <p class="intro">Have an idea, feedback, or a problem with the lesson site? Send a short note using the form below.</p>
      <div class="form-shell">
        <iframe title="Daily English contact form" src="https://docs.google.com/forms/d/e/1FAIpQLSf6uyTxBH5kynd9xZzP0dUaO89x-D7nkMTxrUpBao8xDowuaA/viewform?embedded=true">Loading…</iframe>
      </div>
      <a class="open-link" href="https://docs.google.com/forms/d/e/1FAIpQLSf6uyTxBH5kynd9xZzP0dUaO89x-D7nkMTxrUpBao8xDowuaA/viewform?usp=header" target="_blank" rel="noopener">Open form in a new tab</a>
      <p class="note">If the embedded form does not load, use the button above to open it directly.</p>
    </main>
  </div>
</body>
</html>
