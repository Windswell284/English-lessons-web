<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Contact Us | Daily English</title>
<style>
:root{--bg:#f4f0e8;--paper:#fffdf8;--ink:#1f1c18;--muted:#6d6459;--line:#ded3c4;--accent:#173f5f;--soft:#efe4d3;--shadow:0 18px 45px rgba(36,24,12,.12)}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 0 0,rgba(23,63,95,.13),transparent 30rem),radial-gradient(circle at 100% 100%,rgba(143,63,47,.12),transparent 28rem),var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}
.wrap{width:min(820px,calc(100% - 28px));margin:0 auto;padding:28px 0 46px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.brand{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(28px,6.2vw,48px);line-height:1;font-weight:720;letter-spacing:-.035em}.home{color:var(--accent);font-weight:850;text-decoration:none;border:1px solid var(--line);background:rgba(255,253,248,.75);border-radius:999px;padding:9px 13px;white-space:nowrap;min-width:42px;text-align:center}.card{background:rgba(255,253,248,.94);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:clamp(20px,5vw,34px)}
h1{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(26px,5.4vw,42px);font-weight:720;line-height:1.04;letter-spacing:-.04em;margin:0 0 10px}.intro{color:var(--muted);font-size:17px;margin:0 0 18px;max-width:62ch}.form-shell{overflow:hidden;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.72);box-shadow:0 12px 30px rgba(36,24,12,.08)}iframe{display:block;width:100%;height:760px;border:0;background:transparent}@media(max-width:560px){.top{align-items:flex-start;flex-direction:column}.home{align-self:flex-start}.wrap{width:min(100% - 20px,820px);padding-top:18px}.card{border-radius:22px;padding:16px}iframe{height:820px}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div class="brand">Daily English</div><a class="home" href="/" aria-label="Back to lessons">←</a></div>
    <main class="card">
      <h1>Contact Us</h1>
      <p class="intro">Have an idea, feedback, or a problem with the site? We would love to hear from you.</p>
      <div class="form-shell">
        <iframe data-tally-src="https://tally.so/embed/LZojoO?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="760" frameborder="0" marginheight="0" marginwidth="0" title="Daily English contact form"></iframe>
      </div>
    </main>
  </div>
<script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e){e.src=e.dataset.tallySrc})};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w;s.onload=v;s.onerror=v;d.body.appendChild(s);}</script>
</body>
</html>
